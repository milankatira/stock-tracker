name: Landing Page Quality

# Gates the marketing landing page (LAND-01 / LAND-02): unit tests incl. the
# copy-compliance forbid-list, Lighthouse mobile >= 95 across all four
# categories, and axe-core zero accessibility violations.
on:
  pull_request:
    paths:
      - "apps/web/src/app/page.tsx"
      - "apps/web/src/app/layout.tsx"
      - "apps/web/src/app/globals.css"
      - "apps/web/src/components/landing/**"
      - "apps/web/src/components/ui/**"
      - "apps/web/next.config.ts"
      - "apps/web/lighthouserc.json"
      - ".github/workflows/landing-quality.yml"
  push:
    branches: [main]

jobs:
  unit:
    name: unit — landing tests + copy compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @finsight/shared build
      - run: pnpm --filter @finsight/web test -- src/components/landing

  lighthouse:
    name: lighthouse — mobile >= 95
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @finsight/shared build
      - run: pnpm --filter @finsight/web build
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: apps/web/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  a11y:
    name: a11y — axe-core zero violations
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @finsight/shared build
      - run: pnpm --filter @finsight/web build
      - name: Start server
        run: pnpm --filter @finsight/web start &
      - name: Wait for server
        run: npx --yes wait-on http://localhost:3000 --timeout 60000
      - name: Run axe-core
        run: npx --yes @axe-core/cli http://localhost:3000 --exit
