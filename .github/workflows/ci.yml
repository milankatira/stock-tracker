name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: web — lint, test, model-SDK fence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Forbid live model-SDK imports under public route trees (SEO-04, Layer 2)
        run: |
          # The public SEO pages must read the materialised store only — no live
          # model call on the crawler request path. git grep exits 0 when it finds
          # a match, so a match here must fail the job.
          if git grep -nE "@google/genai|gemini" -- apps/web/src/app/stock apps/web/src/app/fund; then
            echo "::error::Live model-SDK import detected in a public route tree. Public pages must read the materialised store only (SEO-04)."
            exit 1
          fi
          echo "OK — no model-SDK imports in public route trees."

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @finsight/shared build

      - name: Lint web
        run: pnpm --filter @finsight/web lint

      - name: Test web
        run: pnpm --filter @finsight/web test
